<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Registro | EndCosmos</title>
    <meta
      name="description"
      content="Registro de usuarios de EndCosmos con validaciones seguras y diseño futurista."
    />
    <link rel="icon" href="/assets/favicon.ico" />
    <link rel="stylesheet" href="/css/register.css" />
  </head>
  <body>
    <main class="register-page">
      <section class="register-card" aria-labelledby="register-title">
        <p class="kicker">EndCosmos Access</p>
        <h1 id="register-title">Crear cuenta</h1>
        <p class="subtitle">
          Regístrate para sincronizar progreso, rankings y eventos del universo
          EndCosmos.
        </p>

        <form id="register-form" class="register-form" novalidate>
          <label class="field" for="username">
            <span>Username</span>
            <input
              id="username"
              name="username"
              type="text"
              minlength="3"
              maxlength="16"
              autocomplete="username"
              placeholder="Ej: NovaPilot"
              required
            />
          </label>

          <label class="field" for="email">
            <span>Email</span>
            <input
              id="email"
              name="email"
              type="email"
              autocomplete="email"
              placeholder="ejemplo@endcosmos.com"
              required
            />
          </label>

          <label class="field" for="password">
            <span>Password</span>
            <input
              id="password"
              name="password"
              type="password"
              minlength="8"
              maxlength="128"
              autocomplete="new-password"
              placeholder="Mínimo 8 caracteres"
              required
            />
          </label>

          <label class="field" for="confirm-password">
            <span>Confirmar password</span>
            <input
              id="confirm-password"
              name="confirmPassword"
              type="password"
              minlength="8"
              maxlength="128"
              autocomplete="new-password"
              placeholder="Repite tu password"
              required
            />
          </label>

          <label class="field" for="source">
            <span>Origen</span>
            <select id="source" name="source" required>
              <option value="web" selected>Web</option>
              <option value="launcher">Launcher</option>
              <option value="panel">Panel</option>
            </select>
          </label>

          <button id="submit-btn" class="btn-submit" type="submit">
            Registrar cuenta
          </button>

          <p
            id="form-message"
            class="form-message"
            role="status"
            aria-live="polite"
          ></p>
        </form>

        <p class="back-link">
          <a href="/">← Volver al portal principal</a>
        </p>
      </section>
    </main>

    <script src="/js/register.js"></script>
  </body>
</html>
