server {
    listen 80;
    listen [::]:80;
    server_name endcosmos.com www.endcosmos.com;

    root /var/www/endcosmos-web/public;
    index index.html;

    # Core security hardening for static content.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Main routing for static sections (/, /news, /lore, etc.).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache immutable static assets aggressively.
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    location /css/ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    location /js/ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    # Preserve SEO files and fail closed for missing resources.
    location = /robots.txt { try_files $uri =404; }
    location = /sitemap.xml { try_files $uri =404; }

    # Optional lightweight health endpoint for infra checks.
    location = /healthz {
        default_type text/plain;
        return 200 "ok\n";
    }

    # Tighten hidden files access.
    location ~ /\. {
        deny all;
    }
}
