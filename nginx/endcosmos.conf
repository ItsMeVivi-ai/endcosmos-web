server {
    listen 80;
    listen [::]:80;
    server_name endcosmos.com www.endcosmos.com llunaris.com www.llunaris.com;
    server_tokens off;
    autoindex off;

    # Allow ACME HTTP-01 challenge files for TLS issuance/renewal before redirecting.
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/endcosmos.com/public;
        default_type text/plain;
        allow all;
        try_files $uri =404;
    }

    location = /healthz {
        default_type text/plain;
        return 200 "ok\n";
    }

    return 301 https://endcosmos.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name endcosmos.com www.endcosmos.com llunaris.com www.llunaris.com;
    server_tokens off;
    autoindex off;
    client_max_body_size 10m;

    ssl_certificate /etc/letsencrypt/live/endcosmos.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/endcosmos.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    if ($host = www.endcosmos.com) {
        return 301 https://endcosmos.com$request_uri;
    }

    if ($host = llunaris.com) {
        return 301 https://endcosmos.com$request_uri;
    }

    if ($host = www.llunaris.com) {
        return 301 https://endcosmos.com$request_uri;
    }

    # Keep this aligned with the deployment path used by CI/CD.
    root /var/www/endcosmos.com/public;
    index index.html;

    # Core security hardening for static content.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-site" always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; form-action 'self'; img-src 'self' data: blob: https:; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; connect-src 'self' https:; upgrade-insecure-requests" always;

    # Main routing for static sections (/, /news, /lore, etc.).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # FastAPI backend proxy under /api/* (e.g. /api/health -> backend /health).
    location ^~ /api/ {
        proxy_pass http://127.0.0.1:18080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # External admin control-plane (Python MVP on localhost:8088).
    location = /control-plane {
        return 301 /control-plane/;
    }

    location ^~ /control-plane/ {
        proxy_pass http://127.0.0.1:8088/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        proxy_redirect off;
    }

    # Scalable worlds routes: /worlds/{galaxy}/{planet}/{civilization}
    location ^~ /worlds/ {
        try_files $uri $uri/ /worlds/index.html;
    }

    # Cache immutable static assets aggressively.
    location /assets/ {
        limit_except GET HEAD OPTIONS { deny all; }
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    location /css/ {
        limit_except GET HEAD OPTIONS { deny all; }
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    location /js/ {
        limit_except GET HEAD OPTIONS { deny all; }
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    # Preserve SEO files and fail closed for missing resources.
    location = /robots.txt { try_files $uri =404; }
    location = /sitemap.xml { try_files $uri =404; }

    # Optional lightweight health endpoint for infra checks.
    location = /healthz {
        default_type text/plain;
        return 200 "ok\n";
    }

    # Allow ACME HTTP-01 challenge files for TLS issuance/renewal.
    location ^~ /.well-known/acme-challenge/ {
        default_type text/plain;
        allow all;
        try_files $uri =404;
    }

    # Tighten hidden files access, except for the ACME challenge path above.
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # Block accidental exposure of backup/env/sql and similar sensitive artifacts.
    location ~* \.(env|ini|log|sql|bak|old|swp|tmp|dist|example)$ {
        deny all;
    }
}
